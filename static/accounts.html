<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>账户管理 · ChatGPT 注册管理</title>
<link rel="stylesheet" href="/static/style.css?v=13">
</head>
<body data-page="accounts">
<div class="layout">
  <main class="main">
    <h1 class="page-title">账户管理</h1>

    <!-- 生产进度概览 -->
    <div class="produce-bar" id="produce-bar">
      <div class="produce-stat"><span class="produce-num" id="pd-pending">0</span><span class="produce-lbl">待生产</span></div>
      <span class="produce-dot">·</span>
      <div class="produce-stat"><span class="produce-num running" id="pd-running">0</span><span class="produce-lbl">在跑</span></div>
      <span class="produce-dot">·</span>
      <div class="produce-stat"><span class="produce-num ok" id="pd-registered">0</span><span class="produce-lbl">已注册</span></div>
      <span class="produce-dot">·</span>
      <div class="produce-stat"><span class="produce-num bad" id="pd-failed">0</span><span class="produce-lbl">生产失败</span></div>
      <div class="produce-actions">
        <button class="px-btn danger" id="pd-stop" style="display:none" onclick="stopProduce()">停止</button>
      </div>
    </div>

    <div class="toolbar">
      <input id="search" class="px-input search" placeholder="搜索 email / 备注 ...">
      <select id="filter-status" class="px-input">
        <option value="">全部状态</option>
        <option value="registering">注册中</option>
        <option value="registered">已注册</option>
        <option value="register_failed">注册失败</option>
        <option value="already_registered">停用</option>
      </select>
      <button class="px-btn primary" id="produce-btn" onclick="openProduceModal()">生产</button>
    </div>

    <div class="batch-bar" id="acc-batch" style="display:none">
      <span id="acc-batch-count">已选 0 项</span>
      <button class="px-btn" onclick="downloadSelected()">批量下载</button>
      <button class="px-btn danger" onclick="delSelected()">删除所选</button>
      <button class="px-btn ghost" onclick="clearSelection()">取消</button>
    </div>

    <div class="table-wrap">
      <table class="px-table">
        <thead><tr>
          <th class="col-check"><input type="checkbox" id="acc-check-all" onclick="toggleSelectAll(this.checked)"></th>
          <th>邮箱</th><th>创建时间</th><th>状态</th><th>出库状态</th><th>操作</th>
        </tr></thead>
        <tbody id="rows"></tbody>
      </table>
      <div class="pager" id="pager"></div>
    </div>
  </main>
</div>

<!-- 生产 modal -->
<div class="modal-mask" id="produce-modal" style="display:none">
  <div class="modal px-panel" style="width:420px">
    <h2>生产账号</h2>
    <div class="import-sub">填写要生产的账号数量，后台会用「母号 + 裂变」自动注册 ChatGPT + Codex 账号。</div>
    <label class="produce-field">
      <span>生产数量</span>
      <input id="produce-count" class="px-input" type="number" min="1" value="10">
    </label>
    <div class="modal-actions">
      <button class="px-btn" onclick="closeModal('produce-modal')">取消</button>
      <button class="px-btn primary" onclick="startProduce()">开始生产</button>
    </div>
  </div>
</div>

<!-- 日志 modal -->
<div class="modal-mask" id="log-modal" style="display:none">
  <div class="modal px-panel" style="width:640px">
    <h2 id="log-title">执行日志</h2>
    <pre id="log-body" class="log-body"></pre>
    <div class="modal-actions">
      <button class="px-btn ghost" id="log-shot-btn" style="display:none;margin-right:auto" onclick="viewShot()">异常截图</button>
      <button class="px-btn" onclick="closeLog()">关闭</button>
    </div>
  </div>
</div>

<!-- 异常截图 modal -->
<div class="modal-mask" id="shot-modal" style="display:none">
  <div class="modal px-panel" style="width:900px;max-width:94vw">
    <h2 id="shot-title">异常截图</h2>
    <div style="max-height:70vh;overflow:auto;background:#000">
      <img id="shot-img" style="display:block;width:100%" alt="异常截图">
    </div>
    <div class="modal-actions">
      <button class="px-btn" onclick="closeShot()">关闭</button>
    </div>
  </div>
</div>

<div id="toast" class="toast" style="display:none"></div>
<script src="/static/layout.js?v=2"></script>
<script src="/static/accounts.js?v=11"></script>
</body>
</html>
