<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>邮箱管理 · ChatGPT 注册管理</title>
<link rel="stylesheet" href="/static/style.css?v=8">
</head>
<body data-page="mailboxes">
<div class="layout">
  <main class="main">
    <h1 class="page-title">邮箱管理</h1>
    <div class="toolbar">
      <input id="mb-search" class="px-input search" placeholder="搜索 email / 备注 ...">
      <select id="mb-filter" class="px-input">
        <option value="">全部状态</option>
        <option value="unverified">待验证</option>
        <option value="verifying">验证中</option>
        <option value="verify_failed">验证失败</option>
        <option value="verified">已验证</option>
      </select>
      <button class="px-btn primary" onclick="openImportModal()">批量导入邮箱</button>
    </div>
    <div class="batch-bar" id="mb-batch" style="display:none">
      <span id="mb-batch-count">已选 0 项</span>
      <button class="px-btn danger" onclick="delSelected()">删除所选</button>
      <button class="px-btn ghost" onclick="clearSelection()">取消</button>
    </div>
    <div class="table-wrap">
      <table class="px-table">
        <thead><tr><th class="col-check"><input type="checkbox" id="mb-check-all" onclick="toggleSelectAll(this.checked)"></th><th>邮箱</th><th>注册数量</th><th>创建时间</th><th>状态</th><th>操作</th></tr></thead>
        <tbody id="mb-rows"></tbody>
      </table>
      <div class="pager" id="mb-pager"></div>
    </div>
  </main>
</div>

<!-- 邮箱编辑 modal -->
<div class="modal-mask" id="mb-modal" style="display:none">
  <div class="modal px-panel">
    <h2 id="mb-modal-title">新增邮箱</h2>
    <input type="hidden" id="mb-id">
    <label>Email *</label><input id="mb-email" class="px-input">
    <label>密码</label><input id="mb-password" class="px-input">
    <label>服务商</label><input id="mb-provider" class="px-input" placeholder="outlook / gmail ...">
    <label>Client ID（Outlook 取件用）</label><input id="mb-client-id" class="px-input">
    <label>Refresh Token（Outlook 取件用）</label><textarea id="mb-refresh-token" class="px-input" rows="2"></textarea>
    <label>状态</label>
    <select id="mb-status" class="px-input">
      <option value="unverified">待验证</option>
      <option value="verifying">验证中</option>
      <option value="verify_failed">验证失败</option>
      <option value="verified">已验证</option>
    </select>
    <label>备注</label><textarea id="mb-note" class="px-input" rows="3"></textarea>
    <div class="modal-actions">
      <button class="px-btn" onclick="closeModal('mb-modal')">取消</button>
      <button class="px-btn primary" onclick="saveMailbox()">保存</button>
    </div>
  </div>
</div>

<!-- 批量导入 modal -->
<div class="modal-mask" id="import-modal" style="display:none">
  <div class="modal px-panel" style="width:620px">
    <h2>批量导入邮箱</h2>
    <div class="import-sub">每行一个，重复 email 自动跳过，格式：</div>
    <div class="import-formats">
      <code>someone@outlook.com----密码----client_id----refresh_token</code>
    </div>
    <textarea id="import-text" class="px-input import-textarea" rows="11" placeholder="在此粘贴内容，或直接把 txt 文件拖到这里 ..."></textarea>
    <div class="modal-actions">
      <span id="import-count" class="import-count">已识别 0 个邮箱</span>
      <button class="px-btn" onclick="closeModal('import-modal')">取消</button>
      <button class="px-btn primary" onclick="doImport()">导入</button>
    </div>
  </div>
</div>

<!-- 取件 modal -->
<div class="modal-mask" id="mail-modal" style="display:none">
  <div class="modal px-panel mail-modal">
    <div class="mail-head">
      <div>
        <h2 id="mail-title">取件</h2>
        <div class="mail-sub" id="mail-sub"></div>
      </div>
      <button class="px-btn" onclick="closeMailModal()">关闭</button>
    </div>
    <div class="mail-body">
      <div class="mail-list" id="mail-list"><div class="mail-empty">加载中...</div></div>
      <div class="mail-detail">
        <div class="mail-meta" id="mail-meta"></div>
        <iframe id="mail-frame" sandbox="allow-same-origin allow-popups" title="邮件内容"></iframe>
      </div>
    </div>
  </div>
</div>

<div id="toast" class="toast" style="display:none"></div>
<script src="/static/layout.js"></script>
<script src="/static/mailboxes.js?v=7"></script>
</body>
</html>
